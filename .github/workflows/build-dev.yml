name: Build and publish (dev)

on:
  workflow_run:
    workflows:
      - CI Docker build
    types:
      - completed
    branches:
      - dev

permissions:
  contents: read

jobs:
  build_and_publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build tag
        id: build_tag
        run: |
          DATE=$(date -u +%F)
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=$DATE-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.build_tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:dev

      - name: Deploy to EC2 (dev)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/sendit
            aws ecr get-login-password --region eu-north-1 |
              docker login --username AWS --password-stdin 24723.dkr.ecr.eu-north-1.amazonaws.com
            docker compose pull
            docker compose up -d
