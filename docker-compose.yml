services:
  nginx:
    image: nginx:1.27-alpine
    container_name: sendit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - sendit-network

  api:
    image: ${API_IMAGE}
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sendit-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - sendit-network

  db:
    image: postgres:16
    container_name: sendit-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sendit-network

volumes:
  pgdata:

networks:
  sendit-network:
