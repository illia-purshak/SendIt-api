services:
  api:
    image: ${API_IMAGE}
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sendit-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - sendit-network

  db:
    image: postgres:16
    container_name: sendit-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sendit-network

volumes:
  pgdata:

networks:
  sendit-network:
